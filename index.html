<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-gradient=1.0, user-scalable=no">
    <title>SI FOUR AM - Mobile Kasir</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Menghilangkan spin button default input angka agar lebih bersih di HP */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
    </style>
</head>
<body class="bg-[#111111] text-[#eeeeee] min-h-screen font-sans antialiased selective-none">

    <!-- TOP HEADER FIXED BANNER -->
    <div class="sticky top-0 z-50 bg-[#f57c00] text-[#111111] p-4 text-center shadow-md border-b-2 border-black">
        <h1 class="text-xl font-black tracking-widest">SI FOUR AM</h1>
        <p class="text-[10px] font-bold uppercase tracking-wider text-[#222222]">Mobile Report System</p>
    </div>

    <!-- MAIN FORM CONTAINER (1 KOLOM FULL UNTUK MOBILE) -->
    <div class="p-4 max-w-md mx-auto space-y-5 pb-24">
        
        <!-- STEP 1: METADATA DATA HARIAN -->
        <div class="bg-[#1e1e1e] p-4 rounded-xl border border-[#333333] shadow-sm">
            <div class="flex items-center space-x-2 mb-3 border-b border-[#333333] pb-2">
                <span class="bg-[#f57c00] text-black text-xs font-bold px-2 py-0.5 rounded-full">1</span>
                <h2 class="text-xs font-bold text-[#f57c00] uppercase tracking-wide">Metadata Data Harian</h2>
            </div>
            
            <div class="space-y-3">
                <div>
                    <label class="block text-[11px] font-medium text-gray-400 mb-1">Nama Crew / Driver</label>
                    <select id="driver" class="w-full bg-[#2a2a2a] border border-[#444444] text-white rounded-lg p-3 text-sm focus:border-[#f57c00] outline-none h-11">
                        <option value="ACHMAD DARMADI" selected>ACHMAD DARMADI</option>
                        <option value="ACHMAD DARMADI" selected>ACHMAD DARMADI</option>
                        <option value="RICKY AKBAR">RICKY AKBAR</option>
                        <option value="JUNAEDI">JUNAEDI</option>
                        <option value="IRWAN SYAHPUTRA">IRWAN SYAHPUTRA</option>
                        <option value="RIJALDI JANUAR">RIJALDI JANUAR</option>
                        <option value="RIZKY AKBAR ZAFIRA">RIZKY AKBAR ZAFIRA</option>
                    </select>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-[11px] font-medium text-gray-400 mb-1">Tanggal Laporan</label>
                        <input type="date" id="tanggal" class="w-full bg-[#2a2a2a] border border-[#444444] text-white rounded-lg p-2.5 text-sm focus:border-[#f57c00] outline-none h-11" value="2026-06-15">
                    </div>
                    <div>
                        <label class="block text-[11px] font-medium text-gray-400 mb-1">ID Unit Armada</label>
                        <select id="unit" class="w-full bg-[#2a2a2a] border border-[#444444] text-white rounded-lg p-2.5 text-sm focus:border-[#f57c00] outline-none h-11">
                            <option>01</option>
                            <option>02</option>
                            <option>03</option>
                            <option>04</option>
                            <option>05</option>
                            <option>06</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <!-- STEP 2: INPUT CUP TERJUAL & VARIAN MENU -->
        <div class="bg-[#1e1e1e] p-4 rounded-xl border border-[#333333] shadow-sm">
            <div class="flex items-center space-x-2 mb-3 border-b border-[#333333] pb-2">
                <span class="bg-[#f57c00] text-black text-xs font-bold px-2 py-0.5 rounded-full">2</span>
                <h2 class="text-xs font-bold text-[#f57c00] uppercase tracking-wide">Input Varian Menu / Cup Terjual</h2>
            </div>
            
            <!-- Menggunakan layout tabel responsif dengan ukuran padding minimalis agar tidak pecah di layar HP kecil -->
            <div class="overflow-x-auto -mx-2 px-2">
                <table class="w-full text-left text-xs text-gray-300 min-w-[340px]">
                    <thead class="bg-[#2a2a2a] text-gray-400 font-bold uppercase text-[10px]">
                        <tr>
                            <th class="py-2 px-1">Nama Menu</th>
                            <th class="py-2 text-center w-10">Stok</th>
                            <th class="py-2 text-center bg-[#241a10] text-[#f57c00] w-10">Bon</th>
                            <th class="py-2 text-center w-10">Sisa</th>
                            <th class="py-2 text-center w-10">Tun</th>
                            <th class="py-2 text-center w-10">QRIS</th>
                            <th class="py-2 text-center bg-black text-[#ffb74d] w-10">Tot</th>
                        </tr>
                    </thead>
                    <tbody id="productRows" class="divide-y divide-[#333333]">
                        <!-- Diisi otomatis via JavaScript -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- STEP 3: REKAP FINANSIAL & OPERASIONAL -->
        <div class="bg-[#1e1e1e] p-4 rounded-xl border border-[#333333] shadow-sm space-y-4">
            <div class="flex items-center space-x-2 border-b border-[#333333] pb-2">
                <span class="bg-[#f57c00] text-black text-xs font-bold px-2 py-0.5 rounded-full">3</span>
                <h2 class="text-xs font-bold text-[#f57c00] uppercase tracking-wide">Rekap Finansial & Operasional</h2>
            </div>
            
            <div class="grid grid-cols-2 gap-3">
                <div class="bg-black/30 p-2.5 rounded-lg border border-[#333333]">
                    <span class="text-[10px] uppercase font-bold text-gray-400 block">Total Cash</span>
                    <input type="text" id="totalTunai" readonly class="bg-transparent text-sm font-black text-[#f57c00] outline-none w-full mt-0.5" value="Rp 0">
                </div>
                <div class="bg-black/30 p-2.5 rounded-lg border border-[#333333]">
                    <span class="text-[10px] uppercase font-bold text-gray-400 block">Total QRIS</span>
                    <input type="text" id="totalQris" readonly class="bg-transparent text-sm font-black text-green-400 outline-none w-full mt-0.5" value="Rp 0">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-[11px] font-medium text-gray-400 mb-1">Pengeluaran Ops (Rp)</label>
                    <input type="number" id="pengeluaran" oninput="hitungOtomatis()" class="w-full bg-[#2a2a2a] border border-[#444444] text-white rounded-lg p-2.5 text-sm focus:border-[#f57c00] outline-none h-11" value="22000">
                </div>
                <div>
                    <label class="block text-[11px] font-medium text-gray-400 mb-1">Minus/Selisih (Rp)</label>
                    <input type="number" id="minus" oninput="hitungOtomatis()" class="w-full bg-[#2a2a2a] border border-[#444444] text-white rounded-lg p-2.5 text-sm focus:border-[#f57c00] outline-none h-11" value="0">
                </div>
            </div>

            <div class="bg-[#181818] p-3 rounded-xl border border-[#2b2b2b] space-y-2">
                <div class="flex justify-between items-center">
                    <span class="text-xs font-bold text-gray-400">Total Komisi Rider:</span>
                    <span id="totalKomisiText" class="text-base font-black text-amber-500">Rp 0</span>
                </div>
                <div class="flex justify-between items-center border-t border-[#333333] pt-2">
                    <span class="text-xs font-bold text-gray-400">Total Volume:</span>
                    <span id="totalCupText" class="text-xs font-black text-white">0 Cup</span>
                </div>
                <div class="flex justify-between items-center border-t border-[#333333] pt-2">
                    <span class="text-xs font-bold text-gray-400">Total Omzet Bersih:</span>
                    <span id="totalIncomeText" class="text-lg font-black text-emerald-400">Rp 0</span>
                </div>
            </div>
        </div>

    </div>

    <!-- FLOATING BOTTOM ACTION BUTTON (Sangat memudahkan rider saat memencet simpan) -->
    <div class="fixed bottom-0 left-0 right-0 p-4 bg-[#111111]/90 backdrop-blur-md border-t border-[#222222] max-w-md mx-auto">
        <button type="button" onclick="kirimDataKeSheets()" class="w-full bg-[#f57c00] hover:bg-[#e65100] active:scale-[0.98] text-[#111111] font-black py-3.5 px-4 rounded-xl uppercase tracking-wider text-sm transition-all duration-150 shadow-lg">
            Simpan & Sinkronisasi Data
        </button>
    </div>

    <!-- JAVASCRIPT LOGIC -->
    <script>
        const SCRIPT_URL = "PASANG_URL_WEB_APP_ANDA_DISINI";

        // Daftar produk beserta master harga revisi sesuai perintah sebelumnya
        const daftarProduk = [
            { nama: "SIA", harga: 8000, stok: 0, b: 0, sisa: 0, t: 0, q: 0 },
            { nama: "SIKA", harga: 9000, stok: 0, b: 0, sisa: 0, t: 0, q: 0 },
            { nama: "SICL", harga: 12000, stok: 0, b: 0, sisa: 0, t: 0, q: 0 },
            { nama: "SIVL", harga: 12000, stok: 0, b: 0, sisa: 0, t: 0, q: 0 },
            { nama: "SISC", harga: 12000, stok: 0, b: 0, sisa: 0, t: 0, q: 0 },
            { nama: "SIBS", harga: 12000, stok: 0, b: 0, sisa: 0, t: 0, q: 0 },
            { nama: "SIC", harga: 12000, stok: 0, b: 0, sisa: 0, t: 0, q: 0 },
            { nama: "SIM", harga: 12000, stok: 0, b: 0, sisa: 0, t: 0, q: 0 },
            { nama: "SITM", harga: 5000, stok: 0, b: 0, sisa: 0, t: 0, q: 0 }
        ];

        // Render tabel khusus tampilan Mobile
        const tbody = document.getElementById("productRows");
        daftarProduk.forEach((prod, index) => {
            const tr = document.createElement("tr");
            tr.className = "hover:bg-[#252525] transition-colors";
            tr.innerHTML = `
                <td class="py-2.5 px-1 font-bold text-white text-[11px] leading-tight break-words">${prod.nama}</td>
                <td class="py-2.5 text-center"><input type="number" id="stok-${index}" oninput="hitungOtomatis()" class="w-9 bg-[#2a2a2a] border border-[#444444] p-1 text-center rounded text-white text-xs font-semibold" value="${prod.stok}"></td>
                <td class="py-2.5 text-center bg-[#1c1510]"><input type="number" id="bonus-${index}" oninput="hitungOtomatis()" class="w-9 bg-black border border-[#f57c00] p-1 text-center rounded text-[#f57c00] font-bold text-xs" value="${prod.b}"></td>
                <td class="py-2.5 text-center"><input type="number" id="sisa-${index}" oninput="hitungOtomatis()" class="w-9 bg-[#2a2a2a] border border-[#444444] p-1 text-center rounded text-white text-xs" value="${prod.sisa}"></td>
                <td class="py-2.5 text-center"><input type="number" id="tunai-${index}" oninput="hitungOtomatis()" class="w-9 bg-[#2a2a2a] border border-[#444444] p-1 text-center rounded text-white text-xs" value="${prod.t}"></td>
                <td class="py-2.5 text-center"><input type="number" id="qris-${index}" oninput="hitungOtomatis()" class="w-9 bg-[#2a2a2a] border border-[#444444] p-1 text-center rounded text-white text-xs" value="${prod.q}"></td>
                <td class="py-2.5 text-center bg-black font-black text-[#ffb74d] text-xs" id="totalcup-${index}">0</td>
            `;
            tbody.appendChild(tr);
        });

        // Core Perhitungan Rumus Finansial Otomatis
        function hitungOtomatis() {
            let nominalTunai = 0;
            let nominalQris = 0;
            let totalCupSemua = 0;
            let akumulasiKomisi = 0;

            daftarProduk.forEach((prod, index) => {
                const tVal = parseInt(document.getElementById(`tunai-${index}`).value) || 0;
                const qVal = parseInt(document.getElementById(`qris-${index}`).value) || 0;
                
                const totalBaris = tVal + qVal;
                document.getElementById(`totalcup-${index}`).innerText = totalBaris;

                nominalTunai += tVal * prod.harga;
                nominalQris += qVal * prod.harga;
                totalCupSemua += totalBaris;

                // Rumus komisi: SITM dikali 1.000, varian cup lain dikali 2.000
                if (prod.nama === "SITM") {
                    akumulasiKomisi += totalBaris * 1000;
                } else {
                    akumulasiKomisi += totalBaris * 2000;
                }
            });

            const pengeluaran = parseInt(document.getElementById("pengeluaran").value) || 15000;
            const minus = parseInt(document.getElementById("minus").value) || 0;

            const totalIncome = (nominalTunai + nominalQris) - pengeluaran - minus;

            // Render Output Realtime ke UI Dom Komponen
            document.getElementById("totalTunai").value = "Rp " + nominalTunai.toLocaleString('id-ID');
            document.getElementById("totalQris").value = "Rp " + nominalQris.toLocaleString('id-ID');
            document.getElementById("totalKomisiText").innerText = "Rp " + akumulasiKomisi.toLocaleString('id-ID');
            document.getElementById("totalIncomeText").innerText = "Rp " + totalIncome.toLocaleString('id-ID');
            document.getElementById("totalCupText").innerText = totalCupSemua + " Cup";
        }

        // Jalankan kalkulasi inisial harian pertama kali buka halaman
        hitungOtomatis();

        // AJAX POST Kirim JSON Data ke Google Apps Script (Multi Sheet)
        async function kirimDataKeSheets() {
            if (SCRIPT_URL === "https://script.google.com/macros/s/AKfycbz34jOTvMDgw2exMdSchZqvDK69ZS6siEZ8akhxbGRK2_l9QWG2vguuoSkt7NCnONkw/exec") {
                alert("Gagal! Mohon isi parameter SCRIPT_URL dengan tautan Web App Anda.");
                return;
            }

            const payload = {
                tanggal: document.getElementById("tanggal").value,
                driver: document.getElementById("driver").value,
                unit: document.getElementById("unit").value,
                pengeluaran: document.getElementById("pengeluaran").value,
                minus: document.getElementById("minus").value,
                produk: []
            };

            daftarProduk.forEach((prod, index) => {
                const tVal = parseInt(document.getElementById(`tunai-${index}`).value) || 0;
                const qVal = parseInt(document.getElementById(`qris-${index}`).value) || 0;
                payload.produk.push({
                    nama_produk: prod.nama,
                    stok_awal: document.getElementById(`stok-${index}`).value,
                    bonus_claimed: document.getElementById(`bonus-${index}`).value,
                    sisa: document.getElementById(`sisa-${index}`).value,
                    terjual_tunai: tVal,
                    terjual_qris: qVal,
                    total_cup: tVal + qVal
                });
            });

            try {
                alert("Sedang mengirim dan memproses sinkronisasi data...");
                await fetch(SCRIPT_URL, {
                    method: "POST",
                    mode: "no-cors",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
                alert("Sukses! Laporan harian armada telah masuk ke basis data Spreadsheet pusat.");
            } catch (error) {
                alert("Koneksi terputus: " + error.message);
            }
        }
    </script>
</body>
</html>
